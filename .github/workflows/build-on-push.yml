name: Build on Push

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

run-name: "${{ github.event.head_commit.message || 'Manual build' }}"

permissions:
  contents: write

concurrency:
  group: build-on-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
            printf '%s\n' \
              "storePassword=${ANDROID_STORE_PASSWORD}" \
              "keyPassword=${ANDROID_KEY_PASSWORD}" \
              "keyAlias=${ANDROID_KEY_ALIAS}" \
              "storeFile=upload-keystore.jks" > android/key.properties
            echo "Using release keystore from GitHub Secrets."
          else
            echo "No signing secrets configured; building with debug signing."
          fi

      - name: Build release APK
        run: |
          flutter build apk --release --obfuscate --split-debug-info=./debug-info --split-per-abi
          mkdir -p release-assets
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-assets/JWHelper-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk.sha1 release-assets/JWHelper-arm64-v8a.apk.sha1
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-assets/JWHelper-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk.sha1 release-assets/JWHelper-armeabi-v7a.apk.sha1
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release-assets/JWHelper-x86_64.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk.sha1 release-assets/JWHelper-x86_64.apk.sha1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-android
          path: release-assets/
          if-no-files-found: error
          retention-days: 14

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-info-${{ github.run_number }}
          path: debug-info/
          if-no-files-found: error
          retention-days: 90

  build-ios:
    name: Build iOS IPA
    needs: test
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA with Payload
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi

          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '\r' | cut -d'+' -f1)
          IPA_NAME="JWHelper-${VERSION}-nosign.ipa"

          mkdir -p release-assets Payload
          cp -R "$APP_PATH" Payload/
          zip -qq -r "release-assets/${IPA_NAME}" Payload
          rm -rf Payload
          ls -lh release-assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-ios
          path: release-assets/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish Pre-release
    needs: [build-android, build-ios]
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-android
          path: release-assets

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-ios
          path: release-assets

      - name: Prepare release metadata
        id: meta
        run: |
          DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          git log -1 --format=%B > release-body.md
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "tag=daily-${DATE}" >> "$GITHUB_OUTPUT"
          ls -lh release-assets/

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.date }}
          commit: ${{ github.sha }}
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: false
          prerelease: true
          generateReleaseNotes: false
          bodyFile: release-body.md
          artifacts: |
            release-assets/*.apk
            release-assets/*.sha1
            release-assets/*.ipa
