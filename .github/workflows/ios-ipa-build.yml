name: Build iOS IPA

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-ios-ipa:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS app without codesign
        run: flutter build ios --no-codesign

      - name: Package IPA
        id: package
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '\r')
          SAFE_VERSION=${VERSION//+/-}
          APP_PATH="build/ios/iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "jwhelper-${SAFE_VERSION}.ipa" Payload
          echo "ipa_name=jwhelper-${SAFE_VERSION}.ipa" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.ipa_name }}
          path: ${{ steps.package.outputs.ipa_name }}
          if-no-files-found: error
