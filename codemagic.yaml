workflows:
  ios-build:
    name: Build iOS and Android
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install Pods
        script: |
          find . -name "Podfile" -exec dir {} \;
          cd ios && pod install
      - name: Build iOS (No Codesign) and Package IPA
        script: |
          flutter build ios --release --no-codesign
          
          # 手动打包流程 (生成无签名 IPA)
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r -y Payload.zip Payload/
          mv Payload.zip app-unsigned.ipa
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/flutter-apk/*.apk
      - build/ios/iphoneos/*.app
      - "*.ipa"
